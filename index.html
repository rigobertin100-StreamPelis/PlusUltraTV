    <script>
    window.castAvailable = false;
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (isAvailable && window.cast && window.chrome) {
        window.castAvailable = true;
        const btn = document.getElementById("castBtn");
        if (btn) btn.style.display = "inline-block";
      }
    };

    // --- CORRECCIÓN HERO BANNER: FUNCIONES GLOBALES ---
    let heroPlayer; 

    function loadYouTubeIframeAPI(videoId) {
        if (typeof YT === 'undefined' || typeof YT.Player === 'undefined') {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            window.onYouTubeIframeAPIReady = () => createYTPlayer(videoId);
        } else {
            createYTPlayer(videoId);
        }
    }

    function createYTPlayer(videoId) {
        if (heroPlayer && heroPlayer.destroy) { heroPlayer.destroy(); }
        
        heroPlayer = new YT.Player('youtubePlayer', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: { 'autoplay': 1, 'mute': 1, 'controls': 0, 'rel': 0, 'playlist': videoId, 'loop': 1, 'modestbranding': 1 },
            events: {
                'onReady': (event) => event.target.playVideo(),
                'onStateChange': (event) => {
                    if (event.data === 0 && window.setupHeroBanner) { 
                        window.setupHeroBanner(); 
                    }
                }
            }
        });
    }
    </script>

    // Función auxiliar para saltar entre filas (carruseles)
function moverFocoVertical(focusable, currentIndex, direccion) {
    if (currentIndex === -1) {
        focusable[0].focus();
        return;
    }
    const rectActual = focusable[currentIndex].getBoundingClientRect();
    let mejorCandidato = null;
    let minDistancia = Infinity;

    focusable.forEach((el, i) => {
        if (i === currentIndex) return;
        const rect = el.getBoundingClientRect();
        
        // Verificar si está arriba o abajo según la dirección
        const esDireccionCorrecta = direccion > 0 ? rect.top > rectActual.bottom - 10 : rect.bottom < rectActual.top + 10;
        
        if (esDireccionCorrecta) {
            // Calcular distancia euclidiana simple entre centros
            const dist = Math.abs(rect.left - rectActual.left) + Math.abs(rect.top - rectActual.top);
            if (dist < minDistancia) {
                minDistancia = dist;
                mejorCandidato = el;
            }
        }
    });

    if (mejorCandidato) mejorCandidato.focus();
}

            if (Math.abs(this.video.currentTime - this.lastSyncTime) > 60) {
                this.syncToFirebase();
            }
        }
    };

    this.video.onended = () => (currentSeries && (currentSeries.tipo === "serie" || currentSeries.tipo === "anime")) ? window.nextEpisode() : window.closeVideo();

        if (closeBtn) closeBtn.style.opacity = "1";

    });

    cleanup() {

    const list = document.getElementById("episodeList"); 
    list.innerHTML = "";
    currentSeries.temporadas[idx].episodios.forEach((ep, i) => {
        const btn = document.createElement("button"); 
        btn.innerText = ep.titulo; 
        btn.tabIndex = 0;
        btn.onclick = (e) => { 
            e.preventDefault(); 
            currentSeason = idx; 
            currentEpisode = i;
            window.openVideo(ep); 
        };
        list.appendChild(btn);
    });
}

// NAVEGACIÓN DE EPISODIOS CORREGIDA[cite: 1]
window.nextEpisode = () => {
    if (!currentSeries) return;
    const temp = currentSeries.temporadas[currentSeason];
    if (currentEpisode < temp.episodios.length - 1) { 
        currentEpisode++; 
        window.openVideo(temp.episodios[currentEpisode]); 
    } else if (currentSeason < currentSeries.temporadas.length - 1) { 
        currentSeason++; 
        currentEpisode = 0; 
        window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]); 
    } else {
        window.closeVideo();
    }
};

window.prevEpisode = () => {
    if (!currentSeries || (currentSeason === 0 && currentEpisode === 0)) return;
    if (currentEpisode > 0) {
        currentEpisode--;
    } else if (currentSeason > 0) {
        currentSeason--;
        currentEpisode = currentSeries.temporadas[currentSeason].episodios.length - 1;
    }
    window.openVideo(currentSeries.temporadas[currentSeason].episodios[currentEpisode]);
};

window.closeSeriesModal = () => { 
    document.getElementById("seriesModal").style.display = "none"; 
    document.getElementById("modalHero").innerHTML = "";
    currentSeries = null; 
    currentSeason = 0;
    setupHeroBanner(); 
};

window.setupHeroBanner = setupHeroBanner;

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function processCategoryData(data) {
    const sorted = [...data].reverse();
    if (sorted.length <= 15) return sorted;
    const first15 = sorted.slice(0, 15);
    const rest = shuffleArray(sorted.slice(15));
    return first15.concat(rest);
}

function renderAll(){
    const sections = [ 
        { id: "recentRow", data: [...allVideos].slice(-30).reverse() }, 
        { id: "cineRow", data: processCategoryData(allVideos.filter(v => v.tipo === "cine")) },
        { id: "peliculasRow", data: processCategoryData(allVideos.filter(v => v.tipo === "pelicula")) }, 
        { id: "kidsRow", data: processCategoryData(allVideos.filter(v => v.tipo === "kids")) },
        { id: "seriesRow", data: processCategoryData(allVideos.filter(v => v.tipo === "serie")) }, 
        { id: "animeRow", data: processCategoryData(allVideos.filter(v => v.tipo === "anime")) } 
    ];

    sections.forEach(section => {
        const container = document.getElementById(section.id); 
        if(!container) return;
        container.innerHTML = ""; 
        loadedCounts[section.id] = 0; 
        loadNextSegment(section.id, section.data);
        
        const sentinel = document.createElement("div"); 
        sentinel.className = "loading-sentinel"; 
        sentinel.innerText = "•••"; 
        container.appendChild(sentinel);
        
        new IntersectionObserver((entries) => { 
            if (entries[0].isIntersecting) loadNextSegment(section.id, section.data); 
        }, { root: container, threshold: 0.1 }).observe(sentinel);
    });
    
    renderContinue(5);
    renderWatchLater();
}

function loadNextSegment(containerId, sourceData) {
    const container = document.getElementById(containerId); const sentinel = container.querySelector(".loading-sentinel");
    const start = loadedCounts[containerId] || 0; const segment = sourceData.slice(start, start + SEGMENT_SIZE);
    segment.forEach(v => { const card = createCard(v, false); sentinel ? container.insertBefore(card, sentinel) : container.appendChild(card); });
    loadedCounts[containerId] = start + segment.length;
    if (loadedCounts[containerId] >= sourceData.length && sentinel) sentinel.style.display = "none";
}

function createCard(v, isContinue = false) {
    const exp = localStorage.getItem("user_experience");
    const card = document.createElement("div"); 
    card.className = "card skeleton"; 
    card.tabIndex = 0; 
    card.dataset.title = v.titulo.toLowerCase();
    card.style.animationDelay = `${Math.random() * 0.2}s`;

    if (isContinue) card.classList.add("is-continue-card");

    const img = document.createElement("img");
    img.classList.add("lazy-hidden");
    img.dataset.src = v.img; 
    img.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
    
    img.onload = () => {
        card.classList.remove("skeleton");
        img.classList.remove("lazy-hidden");
    };
    lazyLoader.observe(img);
    card.appendChild(img);
    
    if (exp !== 'tv') {
        card.onclick = (e) => { 
            e.preventDefault(); 
            if (isContinue) {
                if (v.tipo === "serie" || v.tipo === "anime") {
                    currentSeries = v;
                    currentSeason = v._prog.season || 0;
                    currentEpisode = v._prog.episode || 0;
                    const ep = v.temporadas[currentSeason].episodios[currentEpisode];
                    window.openVideo(ep);
                } else {
                    currentSeries = null;
                    window.openVideo(v); 
                }
            } else {
                window.openSeriesModal(v); 
            }
        };
    }
    return card;
}

function renderContinue(limite = 5) {
    const data = getProgress(); 
    const row = document.getElementById("continueRow"); 
    const container = document.getElementById("contHeader"); 
    if (!row || !container) return;
    row.innerHTML = "";
    
    let list = Object.keys(data).map(id => { 
        const base = allVideos.find(v => v.titulo.trim() === id.trim()); 
        return base ? { ...base, _prog: data[id] } : null; 
    }).filter(v => v && v._prog.time > 5 && v._prog.time < v._prog.duration * 0.95);
    
    list.sort((a, b) => b._prog.updated - a._prog.updated);
    const finalDisplay = list.slice(0, limite); 
    container.style.display = finalDisplay.length === 0 ? "none" : "block";

    finalDisplay.forEach(v => {
        const p = v._prog; 
        const pct = (p.time / p.duration) * 100;
        let info = (v.tipo === "serie" || v.tipo === "anime") ? `T${(p.season || 0) + 1}:E${(p.episode || 0) + 1}` : `Faltan ${Math.ceil((p.duration - p.time)/60)} min`;
        
        const card = createCard(v, true); 
        const overlay = document.createElement("div");
        overlay.className = "continue-overlay";
        overlay.innerHTML = `
            <div class="continue-info">${info}</div>
            <div class="continue-line">
                <div class="continue-progress" style="width:${pct}%"></div>
            </div>`;
        card.appendChild(overlay);
        row.appendChild(card);
    });
}

function renderWatchLater() {
    const list = getWatchLater();
    const row = document.getElementById("watchLaterRow");
    const header = document.getElementById("wlHeader");
    if (!row || !header) return;
    row.innerHTML = "";
    if (list.length === 0) {
        header.style.display = "none";
    } else {
        header.style.display = "block";
        [...list].reverse().forEach(v => row.appendChild(createCard(v)));
    }
}

document.getElementById("search").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase().trim();
    if (val.length > 0) {
        document.getElementById("mainCatalog").style.display = "none";
        document.getElementById("heroBanner").style.display = "none";
        document.getElementById("searchResultsContainer").style.display = "block";
        const filtered = allVideos.filter(v => v.titulo.toLowerCase().includes(val)).slice(0, 40);
        const resultsRow = document.getElementById("searchResultsRow");
        resultsRow.innerHTML = "";
        filtered.forEach(v => resultsRow.appendChild(createCard(v)));
    } else { window.resetCatalog(); }
});

    document.getElementById("heroBanner").style.display = "block";
    document.getElementById("searchResultsContainer").style.display = "none";

};
